version: '3.8'
services:
  postgres-db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: poc_db
    ports:
      - "5432:5432"

  # Run ONLY ONE of these at a time using the commands below
  go-api:
    build: ./go-poc
    ports:
      - "8080:8080"
    depends_on:
      - postgres-db