version: '3.8'
services:
  postgres-db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: poc_db
    ports:
      - "5432:5432"

  java-api:
    build: ./java-poc
    ports:
      - "8080:8080"
    depends_on:
      - postgres-db