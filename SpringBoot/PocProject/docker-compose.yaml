version: '3.8'

services:
  # ----------------------------------------
  # 1. THE JAVA SPRING BOOT APPLICATION
  # ----------------------------------------
  java-api:
    build: .
    container_name: java_poc
    ports:
      - "8080:8080" # Maps Windows 8080 -> Container 8080
    environment:
      # Use "poc_postgres" because that is your DB container name
      - SPRING_DATASOURCE_URL=jdbc:postgresql://poc_postgres:5432/poc_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
      # Adding Hikari settings here ensures Docker uses your performance tweaks
      - SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE=25
      - SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE=25
    networks:
      - poc_network

networks:
  poc_network:
    external: true