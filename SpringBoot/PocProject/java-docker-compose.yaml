version: '3.8'

services:
  # ----------------------------------------
  # 1. THE JAVA SPRING BOOT APPLICATION
  # ----------------------------------------
  java-api:
    build: .
    container_name: java_poc
    ports:
      - "8081:8080" 
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/poc_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - poc_network

networks:
  poc_network:
    external: true